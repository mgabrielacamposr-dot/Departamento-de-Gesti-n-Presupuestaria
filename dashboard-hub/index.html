<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Dashboards</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#161a21;
    --panel-border:#242a34;
    --text:#e8eaed;
    --text-dim:#8b93a1;
    --accent:#5b8cff;
    --accent-dim:#2b3a5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding:48px 24px;
  }
  .wrap{
    max-width:960px;
    margin:0 auto;
  }
  header{
    margin-bottom:40px;
  }
  .eyebrow{
    color:var(--accent);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  h1{
    font-size:32px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .subtitle{
    color:var(--text-dim);
    margin-top:8px;
    font-size:15px;
  }
  .updated{
    color:var(--text-dim);
    font-size:13px;
    margin-top:16px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:20px;
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
  }
  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .badge{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--accent);
    background:var(--accent-dim);
    padding:3px 8px;
    border-radius:6px;
  }
  .card h2{
    font-size:17px;
    font-weight:600;
  }
  .card p{
    color:var(--text-dim);
    font-size:13px;
    line-height:1.4;
  }
  .card-footer{
    margin-top:auto;
    padding-top:8px;
    font-size:13px;
    color:var(--accent);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .arrow{
    transition:transform 0.15s ease;
  }
  .card:hover .arrow{
    transform:translateX(3px);
  }
  footer{
    margin-top:48px;
    color:var(--text-dim);
    font-size:12px;
    text-align:center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Equipo · Reportes internos</div>
      <h1>Hub de Dashboards</h1>
      <p class="subtitle">Todos los dashboards del equipo, en un solo lugar.</p>
      <p class="updated">Última actualización de este índice: <span id="lastUpdated"></span></p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      Alojado con GitHub Pages · Actualiza <code>dashboards.js</code> para agregar o modificar dashboards
    </footer>
  </div>

  <script src="dashboards.js"></script>
  <script>
    const grid = document.getElementById('grid');
    document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });

    dashboards.forEach(d => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = d.file;
      a.innerHTML = `
        <div class="card-top">
          <h2>${d.title}</h2>
          <span class="badge">${d.category}</span>
        </div>
        <p>${d.description}</p>
        <div class="card-footer">Abrir dashboard <span class="arrow">→</span></div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
